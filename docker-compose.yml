services:
  postgres:
    image: postgres:16-alpine
    container_name: terrainquest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: terrainquest
      POSTGRES_PASSWORD: terrainquest_dev
      POSTGRES_DB: terrainquest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: